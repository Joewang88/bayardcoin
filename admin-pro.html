<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BayardCoin CMS Admin</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{background:#070707;color:#f6eddb}.admin-wrap{max-width:1180px;margin:0 auto;padding:32px 18px}.admin-card{background:rgba(255,255,255,.055);border:1px solid rgba(217,168,51,.24);border-radius:18px;padding:20px;margin:18px 0}.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.admin-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#d9a833;margin:8px 0 5px}input,select,textarea{width:100%;box-sizing:border-box;border:1px solid rgba(255,255,255,.2);background:#111;color:#fff;border-radius:10px;padding:11px}textarea{min-height:110px}.admin-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid rgba(255,255,255,.12);padding:10px;text-align:left;vertical-align:middle}.thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;background:#111}.small-btn{padding:7px 10px;border-radius:8px;border:1px solid rgba(217,168,51,.45);background:transparent;color:#f6eddb;cursor:pointer}.small-btn.danger{border-color:#b66;color:#f5b5b5}.hidden{display:none}.notice{padding:10px 12px;border-radius:10px;background:rgba(217,168,51,.12);border:1px solid rgba(217,168,51,.25);margin:10px 0}.muted{color:#b8ad95}.image-list{display:flex;gap:10px;flex-wrap:wrap}.image-chip{position:relative}.image-chip img{width:88px;height:88px;object-fit:cover;border-radius:10px}.image-chip button{position:absolute;top:3px;right:3px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px}.checkrow{display:flex;align-items:center;gap:8px}.checkrow input{width:auto}@media(max-width:850px){.admin-grid,.admin-grid-3{grid-template-columns:1fr}.table{font-size:13px}}
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="topbar">
      <div><h1>BayardCoin CMS</h1><p class="muted">Real inventory admin: login, upload images, add/edit/sold/delete products.</p></div>
      <a class="btn btn-secondary" href="index.html">View Site</a>
    </div>
    <div id="configWarning" class="notice hidden"></div>
    <section id="loginCard" class="admin-card">
      <h2>Admin Login</h2>
      <div class="admin-grid">
        <div><label>Email</label><input id="loginEmail" type="email" placeholder="admin email"></div>
        <div><label>Password</label><input id="loginPassword" type="password" placeholder="password"></div>
      </div>
      <div class="admin-actions"><button class="btn btn-primary" id="loginBtn">Log In</button></div>
      <p id="loginMsg" class="muted"></p>
    </section>

    <section id="app" class="hidden">
      <div class="admin-card topbar">
        <div><h2>Inventory Dashboard</h2><p id="stats" class="muted"></p></div>
        <div class="admin-actions"><button class="btn btn-primary" id="newBtn">+ New Coin</button><button class="btn btn-secondary" id="logoutBtn">Log Out</button></div>
      </div>

      <section class="admin-card" id="formCard">
        <h2 id="formTitle">Add Product</h2>
        <input type="hidden" id="editingId">
        <div class="admin-grid-3">
          <div><label>ID / Item Number</label><input id="id" placeholder="00002"></div>
          <div><label>Category</label><select id="category"></select></div>
          <div><label>Status</label><select id="status"><option value="available">available</option><option value="sold">sold</option><option value="hold">hold</option></select></div>
        </div>
        <label>Title</label><input id="title" placeholder="CHINA. Yunnan. Tael, ND (1943–44)">
        <div class="admin-grid-3">
          <div><label>Price</label><input id="price" type="number" step="0.01" placeholder="6000"></div>
          <div><label>Currency</label><input id="currency" value="USD"></div>
          <div class="checkrow"><input id="featured" type="checkbox"><label for="featured">Featured on homepage</label></div>
        </div>
        <div class="admin-grid-3">
          <div><label>Country</label><input id="country"></div>
          <div><label>Province</label><input id="province"></div>
          <div><label>Year</label><input id="year"></div>
          <div><label>Denomination</label><input id="denomination"></div>
          <div><label>Variety</label><input id="variety"></div>
          <div><label>Grade</label><input id="grade"></div>
          <div><label>Certification</label><input id="certification" placeholder="PCGS / NGC"></div>
          <div><label>Grading Service</label><input id="grading_service" placeholder="PCGS"></div>
          <div><label>Cert Number</label><input id="cert_number"></div>
        </div>
        <label>Certificate Link</label><input id="cert_link" placeholder="https://www.pcgs.com/cert/...">
        <label>Description</label><textarea id="description"></textarea>
        <label>Upload Images</label><input id="imageFiles" type="file" accept="image/*" multiple>
        <p class="muted">Images upload directly to Supabase Storage. Existing images remain unless you remove them below.</p>
        <div id="imageList" class="image-list"></div>
        <div class="admin-actions">
          <button class="btn btn-primary" id="saveBtn">Save Product</button>
          <button class="btn btn-secondary" id="cancelBtn">Clear Form</button>
        </div>
        <p id="formMsg" class="muted"></p>
      </section>

      <section class="admin-card">
        <div class="topbar"><h2>Products</h2><input id="searchBox" placeholder="Search title, id, grade, cert..."></div>
        <div style="overflow:auto"><table class="table"><thead><tr><th>Image</th><th>Item</th><th>Title</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead><tbody id="productRows"></tbody></table></div>
      </section>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="cms-store.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    let sb, products=[], currentImages=[];
    const fields = ["id","category","status","title","price","currency","country","province","year","denomination","variety","grade","certification","grading_service","cert_number","cert_link","description"];
    function msg(id,t){$(id).textContent=t||""}
    function checkConfig(){
      try{ sb = BayardCMS.client(); return true; }
      catch(e){ $("configWarning").classList.remove("hidden"); $("configWarning").textContent = e.message + " Open config.js and paste Supabase URL + Publishable key."; return false; }
    }
    function fillCats(){ const s=$("category"); s.innerHTML=Object.entries(BAYARD_CATEGORIES).map(([v,n])=>`<option value="${v}">${n}</option>`).join(""); }
    function renderImages(){ $("imageList").innerHTML = currentImages.map((u,i)=>`<span class="image-chip"><img src="${BayardCMS.esc(u)}"><button class="small-btn danger" onclick="removeImg(${i})">×</button></span>`).join(""); }
    window.removeImg = i => { currentImages.splice(i,1); renderImages(); };
    function clearForm(){ fields.forEach(f=>$(f).value = f==="currency"?"USD":""); $("status").value="available"; $("featured").checked=false; $("editingId").value=""; currentImages=[]; renderImages(); $("imageFiles").value=""; $("formTitle").textContent="Add Product"; msg("formMsg",""); }
    function edit(p){ clearForm(); fields.forEach(f=>{ if($(f)) $(f).value = p[f] ?? (f==="currency"?"USD":""); }); $("id").value=p.id; $("editingId").value=p.id; $("featured").checked=!!p.featured; currentImages=Array.isArray(p.images)?[...p.images]:[]; renderImages(); $("formTitle").textContent="Edit Product " + p.id; scrollTo({top:0,behavior:"smooth"}); }
    async function load(){
      const {data,error}=await sb.from("products").select("*").order("created_at",{ascending:false});
      if(error){ alert(error.message); return; }
      products=data||[]; renderRows(); renderStats();
    }
    function renderStats(){ const total=products.length, sold=products.filter(p=>p.status==="sold").length, avail=products.filter(p=>p.status==="available").length; const value=products.filter(p=>p.status!=="sold").reduce((s,p)=>s+(Number(p.price)||0),0); $("stats").textContent=`${total} products · ${avail} available · ${sold} sold · active value ${BayardCMS.money(value,"USD")}`; }
    function renderRows(){
      const q=$("searchBox").value.toLowerCase();
      const rows=products.filter(p=>JSON.stringify(p).toLowerCase().includes(q)).map(p=>`<tr><td><img class="thumb" src="${BayardCMS.esc((p.images||[])[0]||'assets/hero/hero-chinese-coins.jpg')}"></td><td>${BayardCMS.esc(p.id)}</td><td>${BayardCMS.esc(p.title)}</td><td>${BayardCMS.esc(BAYARD_CATEGORIES[p.category]||p.category)}</td><td>${BayardCMS.money(p.price,p.currency)}</td><td>${BayardCMS.esc(p.status)}</td><td><button class="small-btn" onclick='editById(${JSON.stringify(p.id)})'>Edit</button> <button class="small-btn" onclick='toggleSold(${JSON.stringify(p.id)})'>${p.status==="sold"?"Available":"Sold"}</button> <button class="small-btn danger" onclick='delProduct(${JSON.stringify(p.id)})'>Delete</button></td></tr>`).join("");
      $("productRows").innerHTML=rows||`<tr><td colspan="7" class="muted">No products yet.</td></tr>`;
    }
    window.editById=id=>edit(products.find(p=>p.id===id));
    async function uploadImages(id){
      const files=[...$("imageFiles").files]; const urls=[]; const c=BayardCMS.cfg();
      for(const file of files){
        const safe=file.name.replace(/[^a-z0-9_.-]/gi,"-");
        const path=`${id}/${Date.now()}-${safe}`;
        const {error}=await sb.storage.from(c.bucket).upload(path,file,{upsert:true,contentType:file.type});
        if(error) throw error;
        urls.push(sb.storage.from(c.bucket).getPublicUrl(path).data.publicUrl);
      }
      return urls;
    }
    async function save(){
      try{
        msg("formMsg","Saving...");
        const id=$("id").value.trim(); if(!id) throw new Error("ID is required"); if(!$("title").value.trim()) throw new Error("Title is required");
        const uploaded=await uploadImages(id); const images=[...currentImages,...uploaded];
        const p={}; fields.forEach(f=>p[f]=$(f).value.trim());
        p.item_number=id; p.sku=id; p.featured=$("featured").checked; p.images=images; p.price=p.price?Number(p.price):null;
        const editing=$("editingId").value;
        const {error}= editing ? await sb.from("products").update(p).eq("id",editing) : await sb.from("products").insert(p);
        if(error) throw error; msg("formMsg","Saved successfully."); clearForm(); await load();
      }catch(e){ msg("formMsg","Error: "+e.message); }
    }
    window.toggleSold=async id=>{ const p=products.find(x=>x.id===id); const {error}=await sb.from("products").update({status:p.status==="sold"?"available":"sold"}).eq("id",id); if(error) alert(error.message); await load(); };
    window.delProduct=async id=>{ if(!confirm("Delete product "+id+"?")) return; const {error}=await sb.from("products").delete().eq("id",id); if(error) alert(error.message); await load(); };
    async function init(){ fillCats(); if(!checkConfig()) return; const {data:{session}}=await sb.auth.getSession(); if(session){ $("loginCard").classList.add("hidden"); $("app").classList.remove("hidden"); await load(); } }
    $("loginBtn").onclick=async()=>{ if(!checkConfig()) return; msg("loginMsg","Logging in..."); const {error}=await sb.auth.signInWithPassword({email:$("loginEmail").value,password:$("loginPassword").value}); if(error){msg("loginMsg",error.message);return;} location.reload(); };
    $("logoutBtn").onclick=async()=>{ await sb.auth.signOut(); location.reload(); };
    $("newBtn").onclick=clearForm; $("cancelBtn").onclick=clearForm; $("saveBtn").onclick=save; $("searchBox").oninput=renderRows;
    init();
  </script>
</body>
</html>
